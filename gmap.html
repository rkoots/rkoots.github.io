<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Google Map via QR...</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0ea5e9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #e0f2fe, var(--bg));
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(92vw, 400px);
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(14, 165, 233, 0.2);
    }

    .spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 14px;
      border: 4px solid #dbeafe;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="card" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <h1 class="title">Loading map...</h1>
    <p class="subtitle">Redirecting in a moment.</p>
  </main>

  <script>
    const targetUrl = "https://maps.app.goo.gl/RPNVZ8thzZZGXYdM8";
    setTimeout(() => {
      window.location.replace(targetUrl);
    }, 500);
  </script>
</body>
</html>
