{% comment %}
  Improved Table of Contents that works with Jekyll's processed HTML.
  Uses Jekyll's built-in heading IDs and processed content.
{% endcomment %}
{% if page.show_toc %}
  <nav class="toc-nav" id="toc" aria-label="Table of contents">
    <div class="toc-header">
      <i class="fas fa-list-ul" aria-hidden="true"></i>
      <span>Table of Contents</span>
      <button class="toc-toggle" id="toc-toggle" aria-label="Toggle table of contents" aria-expanded="true">
        <i class="fas fa-chevron-up"></i>
      </button>
    </div>
    <ol class="toc-list" id="toc-list">
      <!-- TOC items will be populated by JavaScript -->
    </ol>
  </nav>
  
  <style>
  .toc-nav {
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    border-left: 4px solid #667eea;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 0 0 32px;
    font-size: 0.9rem;
  }
  .toc-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 12px;
  }
  .toc-header i { color: #667eea; }
  .toc-toggle {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: #6c757d;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .toc-toggle:hover { color: #667eea; }
  .toc-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .toc-item { margin-bottom: 6px; }
  .toc-h3 { padding-left: 16px; }
  .toc-link {
    color: #495057;
    text-decoration: none;
    transition: color 0.2s;
    line-height: 1.4;
  }
  .toc-link:hover { color: #667eea; text-decoration: underline; }
  .toc-link.active { color: #667eea; font-weight: 600; }
  .toc-list.collapsed { display: none; }
  @media (max-width: 768px) {
    .toc-nav { font-size: 0.85rem; }
  }
  </style>
  
  <script>
  (function() {
    document.addEventListener('DOMContentLoaded', function() {
      var toggle = document.getElementById('toc-toggle');
      var list = document.getElementById('toc-list');
      
      if (!toggle || !list) return;
      
      // Generate TOC from actual headings in the DOM
      var mainContent = document.querySelector('.main-content');
      if (!mainContent) return;
      
      var headings = mainContent.querySelectorAll('h2, h3');
      if (headings.length === 0) {
        var tocNav = document.getElementById('toc');
        if (tocNav) tocNav.style.display = 'none';
        return;
      }
      
      var tocFragment = document.createDocumentFragment();
      headings.forEach(function(heading, index) {
        // Ensure heading has an ID
        if (!heading.id) {
          var text = heading.textContent.trim();
          var id = text.toLowerCase()
            .replace(/[^a-z0-9\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .trim('-');
          heading.id = id || 'heading-' + index;
        }
        
        var li = document.createElement('li');
        li.className = 'toc-item toc-' + heading.tagName.toLowerCase();
        
        var a = document.createElement('a');
        a.href = '#' + heading.id;
        a.className = 'toc-link';
        a.textContent = heading.textContent.trim();
        
        li.appendChild(a);
        tocFragment.appendChild(li);
      });
      
      list.appendChild(tocFragment);
      
      // Toggle functionality
      toggle.addEventListener('click', function() {
        var expanded = this.getAttribute('aria-expanded') !== 'false';
        list.classList.toggle('collapsed', expanded);
        this.setAttribute('aria-expanded', !expanded);
        this.querySelector('i').className = expanded ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
      });
      
      // Active link highlighting on scroll
      var links = document.querySelectorAll('.toc-link');
      var headingEls = [];
      links.forEach(function(l) {
        var id = l.getAttribute('href').slice(1);
        var el = document.getElementById(id);
        if (el) headingEls.push({ el: el, link: l });
      });
      
      function updateActiveLink() {
        var scrollY = window.scrollY + 100;
        var active = null;
        headingEls.forEach(function(h) {
          if (h.el.offsetTop <= scrollY) active = h;
        });
        links.forEach(function(l) { l.classList.remove('active'); });
        if (active) active.link.classList.add('active');
      }
      
      window.addEventListener('scroll', updateActiveLink, { passive: true });
      updateActiveLink(); // Initial call
    });
  })();
  </script>
{% endif %}
