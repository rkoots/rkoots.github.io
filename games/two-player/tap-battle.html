---
layout: game
permalink: /games/two-player/tap-battle/
title: "Tap Battle"
description: "2-player Tap Battle. Tap your button as fast as possible in 10 seconds. Most taps wins!"
---
<div class="game-container">
  <div class="game-header">
    <div class="game-title">
      <span class="game-emoji">👆</span>
      <h1>Tap Battle</h1>
    </div>
    <a href="/games/two-player/" class="back-link"><i class="fas fa-arrow-left"></i> All 2P Games</a>
  </div>

  <div class="split-game" style="max-width:600px">
    <div class="split-top-bar">
      <div class="player-score p1-score">
        <span class="label">Player 1</span>
        <span class="score" id="p1score">0</span>
      </div>
      <div class="turn-indicator" id="timerDisplay">10.0s</div>
      <div class="player-score p2-score" style="text-align:right">
        <span class="label">Player 2</span>
        <span class="score" id="p2score">0</span>
      </div>
    </div>

    <div class="game-board-area">
      <div class="reaction-arena" style="grid-template-columns:1fr 1fr;gap:12px">
        <button class="reaction-player-zone p1-zone" id="p1Btn" disabled style="cursor:pointer;border:none;font-size:1.2rem;font-weight:700;color:white">
          <span style="font-size:2.5rem;display:block;margin-bottom:8px">👆</span>
          <span id="p1Taps" style="font-size:2.5rem;font-family:'JetBrains Mono',monospace;color:#667eea">0</span>
          <span style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:4px;display:block">TAPS</span>
        </button>

        <button class="reaction-player-zone p2-zone" id="p2Btn" disabled style="cursor:pointer;border:none;font-size:1.2rem;font-weight:700;color:white">
          <span style="font-size:2.5rem;display:block;margin-bottom:8px">👆</span>
          <span id="p2Taps" style="font-size:2.5rem;font-family:'JetBrains Mono',monospace;color:#f093fb">0</span>
          <span style="font-size:0.75rem;color:rgba(255,255,255,0.5);margin-top:4px;display:block">TAPS</span>
        </button>
      </div>

      <p class="game-status-msg" id="statusMsg">Tap as fast as you can for 10 seconds!</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button class="btn-game-action" id="startBtn">Start Battle</button>
        <button class="btn-game-reset" id="resetBtn">Reset Scores</button>
      </div>
    </div>
  </div>
</div>

<style>
.game-container{background:#0d0d1a}
.reaction-player-zone:disabled{opacity:0.6;cursor:not-allowed!important}
.reaction-player-zone:not(:disabled):active{transform:scale(0.92)}
</style>

<script>
(function(){
  var scores = {p1:0, p2:0};
  var taps = {p1:0, p2:0};
  var gameActive = false;
  var startTime, timerInterval;
  var GAME_DURATION = 10000;

  var p1Btn = document.getElementById('p1Btn');
  var p2Btn = document.getElementById('p2Btn');
  var p1TapsEl = document.getElementById('p1Taps');
  var p2TapsEl = document.getElementById('p2Taps');
  var timerDisplay = document.getElementById('timerDisplay');
  var statusMsg = document.getElementById('statusMsg');
  var p1ScoreEl = document.getElementById('p1score');
  var p2ScoreEl = document.getElementById('p2score');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');

  function startGame() {
    taps = {p1:0, p2:0};
    gameActive = true;
    startTime = Date.now();
    p1Btn.disabled = false;
    p2Btn.disabled = false;
    startBtn.style.display = 'none';
    statusMsg.textContent = 'TAP TAP TAP!!!';
    statusMsg.className = 'game-status-msg win';
    updateTaps();

    timerInterval = setInterval(function(){
      var elapsed = Date.now() - startTime;
      var remaining = Math.max(0, GAME_DURATION - elapsed);
      timerDisplay.textContent = (remaining / 1000).toFixed(1) + 's';
      
      if (remaining <= 0) {
        endGame();
      }
    }, 50);
  }

  function endGame() {
    clearInterval(timerInterval);
    gameActive = false;
    p1Btn.disabled = true;
    p2Btn.disabled = true;
    timerDisplay.textContent = '0.0s';

    var winner;
    if (taps.p1 > taps.p2) {
      winner = 'Player 1';
      scores.p1++;
    } else if (taps.p2 > taps.p1) {
      winner = 'Player 2';
      scores.p2++;
    } else {
      winner = 'Tie';
    }

    updateScores();
    
    if (winner === 'Tie') {
      statusMsg.textContent = "It's a Tie! " + taps.p1 + ' taps each! 🤝';
      statusMsg.className = 'game-status-msg draw';
    } else {
      statusMsg.textContent = winner + ' wins with ' + Math.max(taps.p1, taps.p2) + ' taps! 🎉';
      statusMsg.className = 'game-status-msg win';
    }
    
    startBtn.textContent = 'Next Battle';
    startBtn.style.display = 'inline-flex';
  }

  function updateTaps() {
    p1TapsEl.textContent = taps.p1;
    p2TapsEl.textContent = taps.p2;
  }

  function updateScores() {
    p1ScoreEl.textContent = scores.p1;
    p2ScoreEl.textContent = scores.p2;
  }

  p1Btn.addEventListener('click', function(){
    if (gameActive) {
      taps.p1++;
      updateTaps();
      this.classList.add('tapped');
      setTimeout(function(){ p1Btn.classList.remove('tapped'); }, 100);
    }
  });

  p2Btn.addEventListener('click', function(){
    if (gameActive) {
      taps.p2++;
      updateTaps();
      this.classList.add('tapped');
      setTimeout(function(){ p2Btn.classList.remove('tapped'); }, 100);
    }
  });

  p1Btn.addEventListener('touchstart', function(e){
    e.preventDefault();
    if (gameActive) {
      taps.p1++;
      updateTaps();
      this.classList.add('tapped');
      setTimeout(function(){ p1Btn.classList.remove('tapped'); }, 100);
    }
  });

  p2Btn.addEventListener('touchstart', function(e){
    e.preventDefault();
    if (gameActive) {
      taps.p2++;
      updateTaps();
      this.classList.add('tapped');
      setTimeout(function(){ p2Btn.classList.remove('tapped'); }, 100);
    }
  });

  startBtn.addEventListener('click', startGame);
  
  resetBtn.addEventListener('click', function(){
    clearInterval(timerInterval);
    scores = {p1:0, p2:0};
    taps = {p1:0, p2:0};
    gameActive = false;
    updateScores();
    updateTaps();
    p1Btn.disabled = true;
    p2Btn.disabled = true;
    timerDisplay.textContent = '10.0s';
    statusMsg.textContent = 'Tap as fast as you can for 10 seconds!';
    statusMsg.className = 'game-status-msg';
    startBtn.textContent = 'Start Battle';
    startBtn.style.display = 'inline-flex';
  });
}());
</script>
