<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading API Token Capture - Authentication Handler Page</title>
</head>
<body>
    <h3>Processing your request here…</h3>

    <script>
        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            const tokenId = params.get("tokenId");
            const app = params.get("app");

            if (!tokenId) {
                document.body.innerHTML = "<h3>Error: tokenId missing in URL</h3>";
                return;
            }

            let payload;
            let firebaseUrl;

            if (app === "paytm") {
                // Paytm format
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}-${mm}-${dd}`;

                payload = {
                    dtm: dateStr,
                    talk: tokenId
                };
                firebaseUrl = "https://studio-2616610665-59648-default-rtdb.asia-southeast1.firebasedatabase.app/ptm.json";
            } else {
                // Dhan format (default)
                payload = {
                    at: tokenId,
                    dtm: new Date().toISOString()
                };
                firebaseUrl = "https://studio-2616610665-59648-default-rtdb.asia-southeast1.firebasedatabase.app/dhan.json";
            }

            fetch(firebaseUrl, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error("Firebase write failed");
                }
                return res.json();
            })
            .then(() => {
                document.body.innerHTML =
                    "<h3>Token saved successfully. You may close this tab.</h3>";
            })
            .catch(err => {
                console.error(err);
                document.body.innerHTML =
                    "<h3>Error saving token</h3>";
            });
        };
    </script>
</body>
</html>
