<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Loader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-text {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }
        
        .error {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        
        .error-content {
            max-width: 500px;
        }
        
        .error h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .error p {
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="loader-text">Redirecting...</div>
    </div>
    
    <script>
        // Get the src parameter from URL
        const urlParams = new URLSearchParams(window.location.search);
        const srcUrl = urlParams.get('src');
        
        if (srcUrl) {
            try {
                // Decode the URL (handles URL-encoded strings)
                let decodedUrl = decodeURIComponent(srcUrl);
                
                // Remove quotes if present
                decodedUrl = decodedUrl.replace(/^["']|["']$/g, '');
                
                // Validate URL format
                const url = new URL(decodedUrl);
                
                // Redirect after 200ms
                setTimeout(() => {
                    window.location.href = url.href;
                }, 200);
            } catch (e) {
                showError('Invalid URL provided');
            }
        } else {
            showError('No URL specified. Please provide a URL using the <code>src</code> parameter.');
        }
        
        function showError(message) {
            document.body.innerHTML = `
                <div class="error">
                    <div class="error-content">
                        <h1>Error</h1>
                        <p>${message}</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
