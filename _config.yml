# RKoots Technical Knowledge Hub - GitHub Pages Compatible Configuration

title: "RKoots - Technical Architecture & Engineering Leadership"
description: "Deep technical guides on system architecture, engineering leadership, cloud infrastructure, and scalable systems. Built for senior engineers and tech leaders."
url: "https://rkoots.github.io"
baseurl: ""

# Author Information
author:
  name: "Rajkumar Venkataraman"
  email: "contact@rkoots.com"
  twitter: "rkoots"
  github: "rkoots"
  linkedin: "rkoots"

# SEO Configuration
seo:
  default_image: "/assets/images/rkoots-technical-guide-social.jpg"
  twitter_card: "summary_large_image"
  twitter_username: "rkoots"

# Site Configuration
lang: en
timezone: Asia/Kolkata
encoding: utf-8

# Build Settings - GitHub Pages Compatible
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# GitHub Pages Compatible Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-github-metadata
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings

# Pagination (for blog posts)
paginate: 10
paginate_path: "/insights/page:num/"

# Collections - GitHub Pages Compatible
collections:
  architecture:
    output: true
    permalink: /:collection/:name/
  leadership:
    output: true
    permalink: /:collection/:name/
  cloud:
    output: true
    permalink: /:collection/:name/
  tools:
    output: true
    permalink: /:collection/:name/
  programming:
    output: true
    permalink: /:collection/:name/
  ai_ml:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "Rajkumar Venkataraman"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "architecture"
    values:
      layout: "default"
      category: "architecture"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "leadership"
    values:
      layout: "default"
      category: "leadership"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "cloud"
    values:
      layout: "default"
      category: "cloud"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "default"
      category: "tools"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "programming"
    values:
      layout: "default"
      category: "programming"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "ai_ml"
    values:
      layout: "default"
      category: "ai-ml"
      show_toc: true
      related_posts: true

# Category Configuration
categories:
  architecture:
    name: "System Architecture"
    description: "Microservices, distributed systems, scalability patterns, and architectural decision records"
    color: "#1976d2"
    icon: "fas fa-project-diagram"
  leadership:
    name: "Engineering Leadership"
    description: "Team scaling, engineering culture, technical strategy, and code quality practices"
    color: "#7b1fa2"
    icon: "fas fa-users-cog"
  cloud:
    name: "Cloud & DevOps"
    description: "Cloud architecture, Kubernetes, CI/CD pipelines, and infrastructure automation"
    color: "#388e3c"
    icon: "fas fa-cloud"
  tools:
    name: "Developer Tools"
    description: "Development environments, productivity tools, automation scripts, and workflows"
    color: "#f57c00"
    icon: "fas fa-tools"
  programming:
    name: "Programming Deep Dives"
    description: "Advanced Python, Java performance, Go programming, and optimization techniques"
    color: "#d32f2f"
    icon: "fas fa-code"
  ai_ml:
    name: "AI/ML in Production"
    description: "MLOps, LLM integration, production ML systems, and AI architecture patterns"
    color: "#7b1fa2"
    icon: "fas fa-brain"

# Feed Configuration
feed:
  path: feed.xml
  posts_limit: 20

# Sass Configuration
sass:
  style: compressed
  sass_dir: _sass

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE
  - CONTENT_STRATEGY.md
  - SEO_IMPLEMENTATION.md
  - IMPLEMENTATION_GUIDE.md

# Include
include:
  - _pages

# Social Media
social:
  name: "Rajkumar Venkataraman"
  links:
    - https://twitter.com/rkoots
    - https://www.linkedin.com/in/rkoots/
    - https://github.com/rkoots
    - https://dev.to/rkoots

# Optional Front Matter
optional_front_matter:
  remove_originals: true

# Readme Index
readme_index:
  remove_originals: true
  with_frontmatter: true

# Titles from Headings
titles_from_headings:
  enabled: true
  strip_title: true
  collections: false

# GitHub Metadata
github: [metadata]

# Analytics (placeholder - add your actual tracking codes)
google_analytics: ""

# Liquid Settings
liquid:
  error_mode: warn
  strict_filters: false
  strict_variables: false