# RKoots Technical Knowledge Hub - Professional Web Configuration

title: "RKoots - Technical Architecture & Engineering Leadership"
description: "Technical knowledge hub featuring the latest technology news, developer tools, engineering insights, and step-by-step technical guides for senior developers and tech leaders."
url: "https://rkoots.github.io"
baseurl: ""

# Author Information
author:
  name: "Rajkumar Venkataraman"
  email: "contact@rkoots.com"
  twitter: "rkoots"
  linkedin: "rkoots"

# SEO Configuration
seo:
  default_image: "/assets/images/rkoots-technical-guide-social.jpg"
  twitter_card: "summary_large_image"
  twitter_username: "rkoots"

# Site Configuration
lang: en
timezone: Asia/Kolkata
encoding: utf-8

# Build Settings - Professional Web Hosting
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Basic Jekyll Plugins (for local development)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Permalink structure
permalink: /:categories/:year/:month/:day/:title/

# Collections
# tools collection removed - using categories instead

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "Rajkumar Venkataraman"
      show_toc: true
      related_posts: true
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "default"
      author: "Rajkumar Venkataraman"
  - scope:
      path: ""
    values:
      layout: "default"
      show_toc: true
      related_posts: true

# Category Configuration for Existing Content
categories:
  blog:
    name: "Technical Blog"
    description: "Engineering insights, architecture patterns, performance optimization, and technical deep-dives"
    color: "#7b1fa2"
    icon: "fas fa-blog"
  tools:
    name: "Developer Tools"
    description: "Development environments, productivity tools, automation scripts, and software reviews"
    color: "#f57c00"
    icon: "fas fa-tools"
    icon: "fas fa-blog"
  guide:
    name: "Technical Guides"
    description: "Step-by-step tutorials, implementation guides, and comprehensive how-to documentation"
    color: "#388e3c"
    icon: "fas fa-book"
  insights:
    name: "Engineering Insights"
    description: "Industry analysis, technical trends, engineering leadership insights, and strategic perspectives"
    color: "#7b1fa2"
    icon: "fas fa-lightbulb"

# Feed Configuration
feed:
  path: feed.xml
  posts_limit: 20

# Sass Configuration - Temporarily disabled
# sass:
#   style: compressed
#   sass_dir: _sass

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE
  - CONTENT_STRATEGY.md
  - SEO_IMPLEMENTATION.md
  - IMPLEMENTATION_GUIDE.md
  - Gemfile.lock.delete
  - setup.sh
  - setup.bat

# Include
include:
  - _pages

# Social Media
social:
  name: "Rajkumar Venkataraman"
  links:
    - https://rkoots.substack.com
    - https://twitter.com/rkoots
    - https://www.linkedin.com/in/rkoots/
    - https://dev.to/rkoots

# Optional Front Matter
optional_front_matter:
  remove_originals: true

# Readme Index
readme_index:
  remove_originals: true
  with_frontmatter: true

# Titles from Headings
titles_from_headings:
  enabled: true
  strip_title: true
  collections: false

# Web Metadata

# Analytics (placeholder - add your actual tracking codes)
google_analytics: ""

# Liquid Settings
liquid:
  error_mode: warn
  strict_filters: false
  strict_variables: false