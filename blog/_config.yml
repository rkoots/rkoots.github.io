# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Rajkumar's Blog
email: rajkumarv88@icloud.com
description: "Techie One is a modern tech blog exploring software engineering, web development, system design, and the latest in technology trends — where innovation meets simplicity."

baseurl: "/blog"
url: "https://rkoots.github.io"

twitter_username: rkoots
github_username: rkoots
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Kolkata

include:
  - _pages
  - _posts

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Rajkumar V"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Software Architect. Principle Engineer. Writer. Curious mind exploring code, systems, and elegant solutions."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://rkoots.github.io"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/rkoots"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/rkoots"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/rkoots/"

footer:
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://rkoots.github.io"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/rkoots"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/rkoots/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
