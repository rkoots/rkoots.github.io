---
layout: default
title: "{{ page.title | default: site.title }}"
description: "{{ page.description | default: site.description }}"
---

<!-- Page Header -->
<section class="page-header" aria-labelledby="page-title">
  <div class="container">
    <div class="page-header-content">
      <h1 id="page-title" class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
      {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </div>
  </div>
</section>

<!-- Main Content -->
<main class="page-content" role="main">
  <div class="container">
    {{ content }}
  </div>
</main>

<style>
/* Page Header Styles */
.page-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 80px 0;
  margin-bottom: 0;
  position: relative;
  overflow: hidden;
}

.page-header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
  opacity: 0.3;
}

.page-header-content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
}

.page-title {
  font-size: 3rem;
  font-weight: 700;
  margin-bottom: 20px;
  line-height: 1.2;
}

.page-subtitle {
  font-size: 1.3rem;
  margin-bottom: 15px;
  opacity: 0.9;
  font-style: italic;
}

.page-description {
  font-size: 1.1rem;
  opacity: 0.8;
  line-height: 1.6;
}

/* Page Content Styles */
.page-content {
  padding: 60px 0;
  min-height: 60vh;
}

.page-content .container {
  max-width: 1000px;
}

/* Responsive Design */
@media (max-width: 768px) {
  .page-header {
    padding: 60px 0;
  }
  
  .page-title {
    font-size: 2.2rem;
  }
  
  .page-subtitle {
    font-size: 1.1rem;
  }
  
  .page-description {
    font-size: 1rem;
  }
  
  .page-content {
    padding: 40px 0;
  }
}

@media (max-width: 480px) {
  .page-title {
    font-size: 1.8rem;
  }
  
  .page-header {
    padding: 40px 0;
  }
}
</style>
