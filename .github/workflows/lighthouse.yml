name: Lighthouse CI & SEO Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  pa11y-accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pa11y-ci
        run: npm install -g pa11y-ci

      - name: Run accessibility audit
        run: |
          pa11y-ci \
            --config .pa11yci.json \
            https://rkoots.github.io/ \
            https://rkoots.github.io/blog/ \
            https://rkoots.github.io/tools/ \
            https://rkoots.github.io/guide/ \
            https://rkoots.github.io/insights/ || true

  structured-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install schema validator
        run: npm install -g @google/structured-data-testing-tool || true

      - name: Validate structured data on homepage
        run: |
          curl -s "https://validator.schema.org/validate?url=https://rkoots.github.io/" \
            -o schema-result.json || true
          echo "Structured data validation completed (manual review at https://validator.schema.org/)"
