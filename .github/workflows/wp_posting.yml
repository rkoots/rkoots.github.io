name: WP POST - Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    environment: github-pages

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          echo "🔧 Installing Python dependencies..."
          python -m pip install --upgrade pip
          
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
            echo "✅ Dependencies installed from requirements.txt"
          else
            pip install requests google-generativeai
            echo "✅ Core dependencies installed manually"
          fi
          
          pip list | grep -E "(requests|google-generativeai)"

      - name: Generate and post to WordPress
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_KEY: ${{ secrets.WP_KEY }}
        run: |
          echo "🚀 Starting WordPress post generation..."
          
          # Verify environment variables
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$WP_KEY" ]; then
            echo "❌ ERROR: Required API keys not configured!"
            exit 1
          fi
          
          # Execute WordPress posting script
          echo "🐍 Running gemini_wordpress_poster.py..."
          python auto/gemini_wordpress_poster.py
          echo "✅ WordPress posting completed"

      - name: Commit and push changes
        run: |
          echo "🔧 Starting git operations..."
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage blog posts
          git add blog/_posts/*.md
          
          # Commit if changes exist
          if ! git diff --cached --quiet; then
            git commit -m "chore(blog): auto-post - $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Changes committed and pushed"
          else
            echo "ℹ️ No changes to commit"
          fi
