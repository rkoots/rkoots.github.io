name: WP POST - Automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    environment: github-pages

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          echo "🔧 Starting Python dependencies installation..."
          python -m pip install --upgrade pip
          echo "✅ pip upgraded successfully"
          
          echo "📦 Installing from requirements.txt..."
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
            echo "✅ Dependencies installed from requirements.txt"
          else
            echo "📦 Installing required packages manually..."
            pip install requests google-generativeai
            echo "✅ Python dependencies installed successfully"
          fi
          
          echo "📋 Verifying installed packages..."
          pip list | grep -E "(requests|google-generativeai)"

      - name: Generate AI blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_KEY: ${{ secrets.WP_KEY }}
        run: |
          echo "🚀 Starting AI blog post generation..."
          echo "📅 Current date and time: $(date)"
          echo "🔍 Checking if auto/gemini_wordpress_poster.py exists..."
          if [ -f "auto/gemini_wordpress_poster.py" ]; then
            echo "✅ gemini_wordpress_poster.py found"
            echo "📄 File permissions: $(ls -la auto/gemini_wordpress_poster.py)"
          else
            echo "❌ ERROR: auto/gemini_wordpress_poster.py not found!"
            exit 1
          fi
          
          echo "🔑 Checking environment variables..."
          echo "GEMINI_API_KEY: ${GEMINI_API_KEY:+✅ Set}${GEMINI_API_KEY:-❌ Not set}"
          echo "WP_KEY: ${WP_KEY:+✅ Set}${WP_KEY:-❌ Not set}"
          
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ ERROR: GEMINI_API_KEY is not set!"
            exit 1
          fi
          
          if [ -z "$WP_KEY" ]; then
            echo "❌ ERROR: WP_KEY is not set!"
            exit 1
          fi
          
          echo "🐍 Running gemini_wordpress_poster.py..."
          python auto/gemini_wordpress_poster.py
          echo "✅ gemini_wordpress_poster.py script completed"
          
          else
            echo "❌ ERROR: gemini_wordpress_poster.py not found!"
            exit 1
          fi

      - name: Commit generated post to git
        run: |
          echo "🔧 Starting git commit process..."
          echo "📅 Current date and time: $(date)"
          
          echo "⚙️ Configuring git user..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✅ Git user configured"
          
          echo "📁 Current working directory: $(pwd)"
          echo "📋 Repository status:"
          git status
          
          echo "📝 Adding blog/_posts/*.md files..."
          git add blog/_posts/*.md
          
          echo "🔍 Checking staged changes..."
          if git diff --cached --quiet; then
            echo "ℹ️ No generated post changes to commit."
            echo "📋 Final repository status:"
            git status
            exit 0
          else
            echo "✅ Changes staged for commit"
            echo "📋 Staged files:"
            git diff --cached --name-only
          fi
          
          echo "💾 Committing changes..."
          git commit -m "chore(blog): add scheduled Wed/Fri post - $(date +'%Y-%m-%d')"
          echo "✅ Changes committed successfully"
          
          echo "📤 Pushing to repository..."
          git push
          echo "✅ Changes pushed successfully"
          
          echo "🎉 Git commit process completed!"
