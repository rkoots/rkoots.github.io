name: Blogger - Wed Fri Automation

on:
  schedule:
    # 05:35 IST on Wednesday and Friday (00:05 UTC)
    - cron: "5 0 * * 3,5"
  workflow_dispatch:

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Generate post and optionally publish to Blogger
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          PUBLISH_TO_BLOGGER: ${{ secrets.PUBLISH_TO_BLOGGER }}
        run: |
          python auto/blogger.py

      - name: Commit generated post to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add blog/_posts/*.md

          if git diff --cached --quiet; then
            echo "No generated post changes to commit."
            exit 0
          fi

          git commit -m "chore(blog): add scheduled Wed/Fri post"
          git push
