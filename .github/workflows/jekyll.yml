name: Build and Deploy Jekyll Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions for deployment
permissions:
  contents: read

# Allow only one concurrent build
concurrency:
  group: "build"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Remove platform-specific lockfile
        run: |
          if [ -f Gemfile.lock ]; then
            rm Gemfile.lock
          fi
          
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Use Ruby version compatible with GitHub Pages
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          
      - name: Setup Build Environment
        id: build
        uses: actions/configure-pages@v4
        
      - name: Install dependencies
        run: |
          bundle install
          
      - name: Build with Jekyll
        run: |
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: ./_site

  # Deployment job (configure based on your hosting provider)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-files
          path: ./_site
      
      - name: Deploy to hosting provider
        # Configure this step based on your hosting provider
        # Examples: AWS S3, Netlify, Vercel, etc.
        run: |
          echo "Configure deployment to your hosting provider"
          # Add your deployment commands here